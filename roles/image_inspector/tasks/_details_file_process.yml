---
- name: Derive image_path from digest vars file location
  ansible.builtin.set_fact:
    image_path: >-
      {{
        __file.path
        | regex_replace('^' ~ image_inspector_output_dir ~ '/', '')
        | regex_replace('/' ~ image_inspector_vars_subdir ~ '/[^/]+\\.yml$', '')
      }}

- name: Load digest vars from file
  ansible.builtin.include_vars:
    file: "{{ __file.path }}"
    name: image

- name: Set current_data for image update tasks
  ansible.builtin.set_fact:
    current_data:
      image_path: "{{ image_path }}"

- name: Determine if digest needs re-inspection
  vars:
    needs_update_query: >-
      [?
        !ansible_core_version ||
        type(ansible_core_version) == 'null' ||
        ansible_core_version == '' ||
        ansible_core_version == 'pull_failed' ||
        (type(inspection_errors) != 'null' && length(inspection_errors) > `0`) ||
        (type(ansible_collections) == 'array' && length(ansible_collections) > `0` && contains(ansible_collections[0], 'ERROR:')) ||
        type(ansible_collections) == 'null' ||
        type(pip_packages) == 'null' ||
        type(python_version) == 'null' ||
        type(rhel_version) == 'null' ||
        type(system_packages) == 'null' ||
        type(image_tags) == 'null'
      ]
  ansible.builtin.set_fact:
    needs_update: "{{ [image] | community.general.json_query(needs_update_query) | length > 0 }}"

- name: Inspect and save updated digest vars file
  when: needs_update | bool
  block:
    - name: Initialize processed_images list for this digest
      ansible.builtin.set_fact:
        processed_images: []

    - name: Inspect details for digest
      ansible.builtin.include_tasks: _details_image_update.yml

    - name: Save updated digest vars file
      ansible.builtin.template:
        src: digest_var.yml.j2
        dest: "{{ __file.path }}"
        mode: '0644'
      vars:
        digest_record: "{{ processed_images[0] }}"

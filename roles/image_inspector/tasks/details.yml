---

- name: Find all digest vars directories
  ansible.builtin.find:
    paths: "{{ image_inspector_output_dir }}"
    patterns: "{{ image_inspector_vars_subdir }}"
    file_type: directory
    recurse: true
  register: vars_dirs

- name: Find digest vars files in each directory
  ansible.builtin.find:
    paths: "{{ item.path }}"
    patterns: "*.yml"
    file_type: file
  loop: "{{ vars_dirs.files }}"
  register: digest_var_file_lists

- name: Build flat list of digest vars files for configured image paths
  ansible.builtin.set_fact:
    digest_var_files: >-
      {{
        digest_var_file_lists.results
        | map(attribute='files')
        | flatten
        | rejectattr('path', 'search', '/\\.merged_tmp\\.yml$')
        | selectattr(
            'path',
            'search',
            '^'
            ~ (image_inspector_output_dir | regex_escape)
            ~ '/('
            ~ (image_inspector_image_paths | map('regex_escape') | join('|'))
            ~ ')/'
            ~ (image_inspector_vars_subdir | regex_escape)
            ~ '/'
          )
        | list
      }}

- name: Process each digest vars file
  ansible.builtin.include_tasks: _details_file_process.yml
  loop: "{{ digest_var_files }}"
  loop_control:
    loop_var: __file
    label: "{{ __file.path | basename }}"

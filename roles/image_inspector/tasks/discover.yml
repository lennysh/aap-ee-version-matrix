---
# This file is looped over for each image_path

- name: "Discovering images for: {{ image_path }}"
  vars:
    vars_dir: "{{ image_inspector_output_dir }}/{{ image_path }}/{{ image_inspector_vars_subdir }}"
  block:
    - name: Ensure vars output directory exists
      ansible.builtin.file:
        path: "{{ vars_dir }}"
        state: directory
        mode: '0755'

    # 1. Fetch all remote tags and digests
    - name: Fetch remote tags from registry
      ansible.builtin.shell:
        cmd: >
          set -o pipefail &&
          podman search --limit 1000 --list-tags "{{ image_path }}" |
          tail -n +2 | awk '{print $2}'
      register: remote_tags_raw
      changed_when: false

    - name: Filter out excluded tags from the list
      ansible.builtin.set_fact:
        filtered_tags: >
          {{ remote_tags_raw.stdout_lines |
            reject('regex', '.*(' + (image_inspector_exclude_patterns | join('|')) + ').*') |
            list }}

    - name: Inspect each tag to get its digest and creation date
      ansible.builtin.shell:
        cmd: "skopeo inspect --format '{{ '{{' }}.Digest{{ \"}}\" }},{{ '{{' }}.Created.Format \"2006-01-02 15:04:05 MST\"{{ \"}}\" }}' \"docker://{{ image_path }}:{{ item }}\"" # noqa: yaml[line-length]
      register: inspect_results
      loop: "{{ filtered_tags }}"
      loop_control:
        label: "{{ image_path }}@{{ item }}"
      failed_when: false
      changed_when: false

    - name: Initialize remote images by digest dictionary
      ansible.builtin.set_fact:
        remote_images_by_digest: {}

    - name: Aggregate remote tags by digest
      ansible.builtin.set_fact:
        remote_images_by_digest: >
          {{ remote_images_by_digest | default({}) | combine({
              item.stdout.split(',')[0]: {
                'tags': (remote_images_by_digest[item.stdout.split(',')[0]].tags | default([]) + [item.item]) | sort,
                'created': item.stdout.split(',')[1]
              }
            }, recursive=true) }}
      loop: "{{ inspect_results.results }}"
      loop_control:
        label: "{{ image_path }}@{{ item.item }}"
      when:
        - item.rc is defined
        - item.rc == 0
        - item.stdout is defined
        - item.stdout != ""

    # 2. Load existing per-digest vars files
    - name: Find existing digest var files
      ansible.builtin.find:
        paths: "{{ vars_dir }}"
        patterns: "*.yml"
        file_type: file
      register: existing_var_files

    - name: Initialize existing images by digest dictionary
      ansible.builtin.set_fact:
        existing_images_by_digest: {}

    - name: Load each existing digest vars file
      ansible.builtin.include_tasks: _load_existing_digest.yml
      loop: "{{ existing_var_files.files | default([]) }}"
      loop_control:
        loop_var: digest_var_file
        label: "{{ digest_var_file.path | basename }}"

    # 3. Merge remote and existing data, write per-digest vars files
    - name: Render merged image list
      ansible.builtin.template:
        src: merged_images.yml.j2
        dest: "{{ vars_dir }}/.merged_tmp.yml"
        mode: '0600'

    - name: Load merged image list
      ansible.builtin.include_vars:
        file: "{{ vars_dir }}/.merged_tmp.yml"
        name: _merged_data

    - name: Write per-digest vars files
      ansible.builtin.copy:
        dest: "{{ vars_dir }}/{{ item.digest | regex_replace('^sha256:', '') }}.yml"
        content: |
          ---
          {{ item | to_yaml }}
        mode: '0644'
      loop: "{{ _merged_data.images }}"
      loop_control:
        label: "{{ item.digest[-12:] }}"

    - name: Remove temporary merged file
      ansible.builtin.file:
        path: "{{ vars_dir }}/.merged_tmp.yml"
        state: absent

    - name: Compute stale digests for pruning
      ansible.builtin.set_fact:
        stale_digests: "{{ existing_images_by_digest.keys() | list | difference(remote_images_by_digest.keys() | list) }}"

    - name: Remove pruned digest vars files
      ansible.builtin.file:
        path: "{{ vars_dir }}/{{ item | regex_replace('^sha256:', '') }}.yml"
        state: absent
      loop: "{{ stale_digests }}"
      loop_control:
        label: "{{ item[-12:] }}"
      when: image_inspector_prune_images
